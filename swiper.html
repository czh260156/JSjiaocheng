<script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
<div class="swiper">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><img src="https://picsum.photos/600/300?random=1" alt=""></div>
    <div class="swiper-slide"><img src="https://picsum.photos/600/300?random=2" alt=""></div>
    <div class="swiper-slide"><img src="https://picsum.photos/600/300?random=3" alt=""></div>
  </div>
  <div class="swiper-pagination"></div>
  <div class="swiper-button-prev"></div>
  <div class="swiper-button-next"></div>
</div>
<script>
let mySwiper = new Swiper('.swiper', {
  direction: 'horizontal', // 水平切换选先
  loop: true, // 循环模式选项
  autoplay: false, // 关闭自动播放
  effect: 'fade', // 消融效果
  // 分页器
  pagination: {
    el: '.swiper-pagination',
    clickable: true, // 允许点击分页器进行切换
  },
  // 导航按钮
  navigation: {
    nextEl: '.swiper-button-next',
    prevEl: '.swiper-button-prev',
  },
});
</script>
